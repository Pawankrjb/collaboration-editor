<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Writing</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="box-wrap">
        <div class="page-header">
            <p class="page-kicker">Live Writing</p>
            <h1>Write on the web</h1>
            <p class="page-subtitle">A simple place to type, edit, and keep your thoughts in one box.</p>
        </div>
        <textarea class="writing-box" placeholder="Start writing..."></textarea>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>        
        const socket = io();
        const writingBox = document.querySelector('.writing-box');
        writingBox.addEventListener('input', () => {
            socket.emit('editor-change', writingBox.value);
        });
        socket.on('editor-change', (data) => {
            writingBox.value = data;
        });
    </script>
</body>
</html>
